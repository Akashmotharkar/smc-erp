<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="theme-color"
          content="#1976d2">

    <title>Milk Analyzer Bluetooth Tester</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <div id="app">

        <!-- ==========================================================
             HEADER
        =========================================================== -->

        <header class="app-header">

            <div class="header-left">

                <h1>
                    Milk Analyzer Bluetooth Tester
                </h1>

                <div id="appVersion"
                     class="version-label">
                    Version 1.0
                </div>

            </div>

            <div class="header-right">

                <div id="connectionBadge"
                     class="status-badge disconnected">

                    Disconnected

                </div>

            </div>

        </header>

        <!-- ==========================================================
             MAIN CONTENT
        =========================================================== -->
        
        <main class="main-layout">
        
            <!-- ==========================================
                 SAMPLE DATA
            =========================================== -->
        
            <section class="card form-card">
        
                <div class="card-title">
                    Sample Data
                </div>
        
                <div class="compact-grid">
        
                    <div class="field">
                        <label for="fatInput">FAT</label>
                        <input id="fatInput"
                               type="number"
                               readonly>
                    </div>
        
                    <div class="field">
                        <label for="snfInput">SNF</label>
                        <input id="snfInput"
                               type="number"
                               readonly>
                    </div>
        
                    <div class="field">
                        <label for="clrInput">CLR</label>
                        <input id="clrInput"
                               type="number"
                               readonly>
                    </div>
        
                    <div class="field">
                        <label for="sampleInput">Sample No.</label>
                        <input id="sampleInput"
                               type="text">
                    </div>
        
                    <div class="field full-width">
                        <label for="deviceInput">Device</label>
                        <input id="deviceInput"
                               type="text"
                               readonly>
                    </div>
        
                    <div class="field full-width">
                        <label for="timeInput">Received Time</label>
                        <input id="timeInput"
                               type="text"
                               readonly>
                    </div>
        
                </div>
        
                <div class="button-row">
        
                    <button id="clearValuesBtn"
                            class="secondary-btn">
                        Clear Values
                    </button>
        
                    <button id="saveSampleBtn"
                            class="primary-btn">
                        Save Sample
                    </button>
        
                </div>
        
            </section>
        
            <!-- ==========================================
                 BLUETOOTH
            =========================================== -->
        
            <section class="card bluetooth-card">
        
                <div class="card-title">
                    Bluetooth Connection
                </div>
        
                <div class="connection-type">
        
                    <label class="radio-item">
                        <input
                            type="radio"
                            id="bleRadio"
                            name="connectionType"
                            value="ble"
                            checked>
                        BLE
                    </label>
        
                    <label class="radio-item">
                        <input
                            type="radio"
                            id="serialRadio"
                            name="connectionType"
                            value="serial">
                        Serial Bluetooth
                    </label>
        
                </div>
        
                <div class="button-grid">
        
                    <button id="searchBtn"
                            class="primary-btn">
                        Search
                    </button>
        
                    <button id="refreshStatusBtn"
                            class="secondary-btn">
                        Refresh
                    </button>
        
                    <button id="connectBtn"
                            class="primary-btn"
                            disabled>
                        Connect
                    </button>
        
                    <button id="disconnectBtn"
                            class="danger-btn"
                            disabled>
                        Disconnect
                    </button>
        
                    <button id="clearLogBtn"
                            class="secondary-btn">
                        Clear Log
                    </button>
        
                </div>
        
                <div class="section-label">
                    Available Devices
                </div>
        
                <select id="deviceList"
                        size="6">
                </select>
        
            </section>
        
        </main>        

        <!-- ==========================================================
             DIAGNOSTICS
        ========================================================== -->
        
        <section class="diagnostic-layout">
        
            <!-- RAW DATA -->
        
            <section class="card">
        
                <div class="card-title">
                    Raw Data
                </div>
        
                <div class="toolbar">
        
                    <button id="copyRawBtn"
                            class="secondary-btn">
        
                        Copy
        
                    </button>
        
                    <button id="clearRawBtn"
                            class="secondary-btn">
        
                        Clear
        
                    </button>
        
                </div>
        
                <pre id="rawDataPanel"
                     class="raw-panel">
                </pre>
        
            </section>
        
            <!-- EVENT LOG -->
        
            <section class="card">
        
                <div class="card-title">
                    Event Log
                </div>
        
                <div class="toolbar">
        
                    <button id="copyLogBtn"
                            class="secondary-btn">
        
                        Copy Log
        
                    </button>
        
                    <button id="downloadLogBtn"
                            class="secondary-btn">
        
                        Download
        
                    </button>
        
                </div>
        
                <div id="logPanel"
                     class="log-panel">
                </div>
        
            </section>
        
        </section>
      
        <!-- ==========================================================
             LOADING OVERLAY
        =========================================================== -->

        <div id="loadingOverlay"
             class="loading-overlay hidden">

            <div class="loading-box">

                <div class="spinner"></div>

                <div id="loadingText">

                    Please wait...

                </div>

            </div>

        </div>

    </div>

    <!-- ==========================================================
         JAVASCRIPT FILES
         Load order is important.
    =========================================================== -->

    <script src="js/logger.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/api.js"></script>
    <script src="js/parser.js"></script>
    <script src="js/ble.js"></script>
    <script src="js/serial.js"></script>
    <script src="js/bluetooth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
